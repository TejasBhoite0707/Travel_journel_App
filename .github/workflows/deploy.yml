name: Build MERN Pipeline

on:
    push:
      branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        
        steps:
          - name:  Checkout code
            uses:  action/checkout@v3
          
          - name:  Setup Node
            uses:  action/setup-node@v3
            with:
               node-version: 18
          - name:  Install Backend Dependencies
            run: |
              cd Backend
              npm install
          - name:  Build React App
            run: |    
              cd Frontend       
              npm run build 