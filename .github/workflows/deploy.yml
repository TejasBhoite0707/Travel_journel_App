name: Build MERN Pipeline

on:
    push:
      branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        
        steps:
          - name:  Checkout code
            uses:  actions/checkout@v3
          
          - name:  Setup Node
            uses:  actions/setup-node@v3
            with:
               node-version: 22

          - name: Cache Node Modules
            uses: actions/cache@v3
            with:
              path: ~/.npm
              key: ${{runner.os}}-node-${{hashFiles('**/package-lock.json')}}  

          - name:  Install Backend Dependencies
            run: |
              cd Backend
              npm ci
          - name: Install Frontend Dependencies
            run: |
              cd Frontend
              npm ci    
          - name: Remove old Build
            run:  |
              cd Frontend
              rm -rf dist    
          - name:  Build React App
            run: |    
              cd Frontend       
              npm run build     
          - name: Verify Backend Starts
            run:  |
              cd Backend
              node index.js &
              sleep 5  
          - name: Upload React Build Artifact
            uses: actions/upload-artifact@v4
            with: 
              name: react-build
              path: Frontend/dist       
    deploy:
        needs: build
        runs-on: ubuntu-latest
      
        steps:

          - name: Download React Build
            uses: actions/download-artifact@v4
            with:
              name: react-build
              path: dist
          
          - name: Copy Build to EC2
            uses: appleboy/scp-action@v1.0.3
            with:
              host: ${{secrets.EC2_HOST}}
              username: ${{secrets.EC2_USER}}
              key: ${{secrets.EC2_SSH_KEY }}
              source: "dist/*"
              target: "~/Travel_journel_App/Frontend/dist"

          - name: Deploy to EC2(Backend)
            uses: appleboy/ssh-action@v1.0.3
            with:
              host: ${{secrets.EC2_HOST}}
              username: ${{secrets.EC2_USER}}
              key: ${{secrets.EC2_SSH_KEY }}
              script: |
                cd ~/Travel_journel_App

                # Always sync with latest commit
                git fetch origin
                git reset --hard origin/main

                cd Backend
                npm ci

                pm2 restart index || pm2 start index.js --name index